  <main>
    <section class="funky-section contact">
      <h2>צור קשר עם טכנאי</h2>
      <form id="contactForm">
        <label for="name">שם:</label>
        <input type="text" id="name" name="name" required>
        <label for="phone">טלפון:</label>
        <input type="tel" id="phone" name="phone" required>
        <label for="message">הודעה:</label>
        <textarea id="message" name="message" required></textarea>
        <button type="submit" class="cta-btn neon">שלח</button>
      </form>
      <div id="formResponse" style="margin-top:12px;"></div>
      <div class="quick-contact">
        <a href="tel:0503131231" class="phone-btn">התקשר עכשיו</a>
        <a href="https://wa.me/972503131231" class="whatsapp-btn">שלח WhatsApp</a>
      </div>
      <div class="contact-funky">
        <img src="img/phone.svg" alt="טלפון" style="width:66px;margin-top:20px;">
        <img src="img/chat.svg" alt="שיחה" style="width:66px;">
      </div>
    </section>
  </main>
  <footer>
